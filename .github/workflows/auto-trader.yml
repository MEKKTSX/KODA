name: 🤖 AI Hedge Fund Auto Rebalance
on:
  schedule:
    # 10:00 น. ไทย = 03:00 UTC
    # 20:00 น. ไทย = 13:00 UTC
    - cron: '0 3,13 * * *'
  workflow_dispatch: # ให้กดรันมือได้จาก GitHub ได้ด้วย

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: { node-version: '20' }
      
      - name: Run AI Trader Script
        run: node scripts/bot.js
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          SERPER_KEY: ${{ secrets.SERPER_KEY }}

      - name: Commit & Push Changes
        run: |
          git config --global user.name 'KODA-Bot'
          git config --global user.email 'bot@kodalab.ai'
          git add portfolio.json
          git commit -m "🤖 AI Auto Rebalance Update" || echo "No changes"
          git push
