<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KODA - AI Operations</title>
    <script src="js/keys.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e17">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#34a8eb", 
                        "success": "#00c076", 
                        "danger": "#ff4d4d", 
                        "background-dark": "#0a0e17", 
                        "surface-dark": "#161c2b", 
                        "border-dark": "#232b3e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        ::-webkit-scrollbar { display: none; }
        body { min-height: max(884px, 100dvh); }
        
        /* Typing Dots Animation */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Markdown Styles for Gemini Output */
        .ai-message-content b, .ai-message-content strong { color: #fff; font-weight: 700; }
        .ai-message-content p { margin-bottom: 0.5rem; }
        .ai-message-content ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.5rem; }
        .ai-message-content li { margin-bottom: 0.25rem; }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen font-display flex flex-col">
<div class="max-w-md mx-auto flex flex-col min-h-screen w-full border-x border-border-dark/30 relative overflow-hidden">
    
    <header class="flex items-center p-4 pb-3 justify-between sticky top-0 bg-background-dark/95 backdrop-blur-md z-20 border-b border-border-dark/30 shrink-0">
        <div class="flex size-10 items-center justify-center rounded-full bg-primary/20 border border-primary/30">
            <span class="material-symbols-outlined text-primary text-xl">auto_awesome</span>
        </div>
        <div class="flex flex-col items-center flex-1">
            <h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight">KODA Copilot</h2>
            <p class="text-success text-[10px] uppercase font-bold tracking-wider flex items-center gap-1">
                <span class="size-1.5 bg-success rounded-full"></span> Online
            </p>
        </div>
        <button id="btn-new-chat" class="flex size-10 items-center justify-center rounded-full hover:bg-surface-dark text-slate-300 transition-colors">
            <span class="material-symbols-outlined">add_comment</span>
        </button>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4 pt-4 flex flex-col gap-5" id="chat-container">
        
        <div class="bg-gradient-to-br from-surface-dark to-background-dark border border-border-dark rounded-2xl p-4 shadow-lg shrink-0">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-white text-sm font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-base">summarize</span> Morning Briefing
                </h3>
                <span class="text-slate-500 text-[10px]">Daily Update</span>
            </div>
            <div id="morning-brief-content">
                <div class="flex justify-center py-2"><div class="size-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>
            </div>
        </div>

        <div class="shrink-0" id="recent-chats-wrapper" style="display: none;">
            <div class="flex items-center justify-between mb-2">
                <h4 class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Recent Chats</h4>
                <button id="btn-clear-chats" class="text-slate-500 hover:text-danger transition-colors text-[10px] font-bold uppercase tracking-widest">Clear</button>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4 snap-x no-scrollbar" id="recent-chats-container">
            </div>
        </div>

        <div class="flex flex-col gap-4" id="chat-messages">
        </div>

        <div id="scroll-anchor" class="h-1 shrink-0"></div>

    </main>

    <div class="fixed bottom-[68px] left-1/2 -translate-x-1/2 w-full max-w-md bg-background-dark/95 backdrop-blur-lg border-t border-border-dark z-20 px-4 py-3">
        <form id="chat-form" class="relative flex items-center bg-surface-dark border border-border-dark rounded-xl focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all p-1">
            <input type="text" id="chat-input" class="w-full bg-transparent border-none text-sm text-slate-100 placeholder:text-slate-500 focus:ring-0 px-3 py-2 outline-none" placeholder="Ask KODA about markets..." autocomplete="off"/>
            <button type="submit" class="flex size-8 shrink-0 items-center justify-center rounded-lg bg-primary text-white hover:bg-blue-500 transition-colors mr-1 disabled:opacity-50 disabled:cursor-not-allowed" id="send-btn" disabled>
                <span class="material-symbols-outlined text-lg">send</span>
            </button>
        </form>
    </div>

    <div id="bottom-nav-container"></div>
</div>

<script src="js/nav.js"></script>
<script src="js/ai-helper.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {

    await window.loadKodaConfig();
    // 🔑 1. ระบบ 3 API Keys สลับกันเมื่อโควต้าเต็ม (แก้บัคค้าง)
    const GEMINI_API_KEYS = window.ENV_KEYS.GEMINI;
    
    let currentKeyIdx = 0;

    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');
    const chatContainer = document.getElementById('chat-container');
    const btnNewChat = document.getElementById('btn-new-chat');
    const recentChatsWrapper = document.getElementById('recent-chats-wrapper');
    const recentChatsContainer = document.getElementById('recent-chats-container');
    const btnClearChats = document.getElementById('btn-clear-chats');
    const morningBriefContent = document.getElementById('morning-brief-content');

    let kodaSessions = JSON.parse(localStorage.getItem('koda_chat_sessions') || '{}');
    let currentSessionId = null;
    let currentHistory = []; 

    const renderMorningBrief = async () => {
        const baseBrief = "The US market closed mixed last night. Tech stocks rallied due to strong AI chip demand, while the energy sector pulled back slightly on oil inventory reports. Overall sentiment remains cautiously optimistic. Watch for upcoming CPI data.";
        
        const isTranslateOn = localStorage.getItem('koda_translate_th') === 'true';
        
        if (isTranslateOn && window.KodaAI && typeof window.KodaAI.translateText === 'function') {
            const translatedText = await window.KodaAI.translateText(baseBrief);
            morningBriefContent.innerHTML = `<p class="text-slate-300 text-sm leading-relaxed">${translatedText}</p>`;
        } else {
            morningBriefContent.innerHTML = `<p class="text-slate-300 text-sm leading-relaxed">${baseBrief}</p>`;
        }
    };
    renderMorningBrief();

    const scrollToBottom = () => {
        requestAnimationFrame(() => {
            setTimeout(() => {
                const anchor = document.getElementById('scroll-anchor');
                if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
                
                window.scrollTo({ top: document.body.scrollHeight || document.documentElement.scrollHeight, behavior: 'smooth' });
                
                if (chatContainer) {
                    chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
                }
            }, 100); 
        });
    };

    chatInput.addEventListener('focus', () => setTimeout(scrollToBottom, 300));
    window.addEventListener('resize', scrollToBottom);

    chatInput.addEventListener('input', () => {
        sendBtn.disabled = chatInput.value.trim() === '';
    });

    const appendUserMessage = (text) => {
        const html = `
            <div class="flex justify-end w-full">
                <div class="bg-primary text-white rounded-2xl rounded-br-sm p-3 shadow-sm max-w-[85%]">
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', html);
        scrollToBottom(); 
    };

    const appendAIMessage = (text, isWelcome = false) => {
        const html = `
            <div class="flex items-end gap-2 w-full max-w-[90%]">
                <div class="flex size-6 shrink-0 items-center justify-center rounded-full bg-primary/20 border border-primary/30 mb-1">
                    <span class="material-symbols-outlined text-primary text-[14px]">auto_awesome</span>
                </div>
                <div class="bg-surface-dark border border-border-dark rounded-2xl rounded-bl-sm p-3 shadow-sm ai-message-content text-slate-200 text-sm leading-relaxed">
                    ${markedToHtml(text)}
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', html);
        scrollToBottom(); 
    };

    const appendTypingIndicator = () => {
        const id = 'typing-' + Date.now();
        const html = `
            <div id="${id}" class="flex items-end gap-2 w-full max-w-[85%]">
                <div class="flex size-6 shrink-0 items-center justify-center rounded-full bg-primary/20 border border-primary/30 mb-1">
                    <span class="material-symbols-outlined text-primary text-[14px]">auto_awesome</span>
                </div>
                <div class="bg-surface-dark border border-border-dark rounded-2xl rounded-bl-sm py-3 px-4 shadow-sm flex gap-1 items-center h-[42px]">
                    <div class="size-2 bg-slate-500 rounded-full typing-dot"></div>
                    <div class="size-2 bg-slate-500 rounded-full typing-dot"></div>
                    <div class="size-2 bg-slate-500 rounded-full typing-dot"></div>
                </div>
            </div>
        `;
        chatMessages.insertAdjacentHTML('beforeend', html);
        scrollToBottom(); 
        return id;
    };

    const markedToHtml = (text) => {
        let html = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-white">$1</b>'); 
        html = html.replace(/\*(.*?)\*/g, '<i>$1</i>'); 
        html = html.replace(/(?:\r\n|\r|\n)\* /g, '<br/>• '); 
        html = html.replace(/(?:\r\n|\r|\n)\- /g, '<br/>• '); 
        html = html.replace(/\n\n/g, '</p><p class="mt-2">'); 
        html = html.replace(/\n/g, '<br/>'); 
        return `<p>${html}</p>`;
    };

    const saveSession = () => {
        if (!currentSessionId || currentHistory.length === 0) return;
        kodaSessions[currentSessionId] = {
            id: currentSessionId,
            timestamp: Date.now(),
            title: currentHistory.find(m => m.role === 'user')?.parts[0].text.substring(0, 25) + '...' || 'New Chat',
            history: currentHistory
        };
        localStorage.setItem('koda_chat_sessions', JSON.stringify(kodaSessions));
        renderRecentChats();
    };

    const loadSession = (sessionId) => {
        if (!kodaSessions[sessionId]) return;
        currentSessionId = sessionId;
        currentHistory = kodaSessions[sessionId].history;
        chatMessages.innerHTML = ''; 
        
        currentHistory.forEach(msg => {
            if (msg.role === 'user') {
                appendUserMessage(msg.parts[0].text);
            } else {
                appendAIMessage(msg.parts[0].text);
            }
        });
        
        scrollToBottom();
    };

    const createNewSession = () => {
        currentSessionId = 'session_' + Date.now();
        currentHistory = [];
        chatMessages.innerHTML = '';
        
        const isTranslateOn = localStorage.getItem('koda_translate_th') === 'true';
        const welcomeText = isTranslateOn 
            ? "สวัสดีครับ! ผม KODA พร้อมวิเคราะห์ตลาดให้คุณแล้ว วันนี้อยากให้ผมช่วยดูหุ้นตัวไหน อัปเดตข่าวสดๆ หรือเช็คพอร์ตของคุณไหมครับ?"
            : "Hello! I'm KODA, ready to analyze the markets. What would you like to check today?";
        
        appendAIMessage(welcomeText, true);
    };

    const renderRecentChats = () => {
        const sessionsArray = Object.values(kodaSessions).sort((a, b) => b.timestamp - a.timestamp);
        if (sessionsArray.length === 0) {
            recentChatsWrapper.style.display = 'none';
            return;
        }
        recentChatsWrapper.style.display = 'block';
        recentChatsContainer.innerHTML = sessionsArray.map(session => `
            <button class="shrink-0 bg-surface-dark border ${session.id === currentSessionId ? 'border-primary text-primary' : 'border-border-dark text-slate-300'} text-[10px] font-medium px-4 py-2 rounded-full hover:border-primary hover:text-primary transition-colors snap-start flex items-center gap-1" onclick="window.switchKodaChat('${session.id}')">
                <span class="material-symbols-outlined text-[12px]">chat_bubble</span> ${session.title}
            </button>
        `).join('');
    };

    window.switchKodaChat = (sessionId) => {
        loadSession(sessionId);
        renderRecentChats(); 
    };

    btnNewChat.addEventListener('click', () => {
        createNewSession();
        renderRecentChats();
    });

    btnClearChats.addEventListener('click', () => {
        if(confirm("Are you sure you want to clear all chat history?")) {
            kodaSessions = {};
            localStorage.removeItem('koda_chat_sessions');
            createNewSession();
            renderRecentChats();
        }
    });

    if (Object.keys(kodaSessions).length > 0) {
        const latestSession = Object.values(kodaSessions).sort((a, b) => b.timestamp - a.timestamp)[0];
        loadSession(latestSession.id);
        renderRecentChats();
    } else {
        createNewSession();
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = chatInput.value.trim();
        if (!text) return;

        appendUserMessage(text);
        chatInput.value = '';
        sendBtn.disabled = true;

        if (currentHistory.length > 0 && currentHistory[currentHistory.length - 1].role === 'user') {
            currentHistory.pop(); 
        }

        currentHistory.push({ role: "user", parts: [{ text: text }] });
        saveSession();

        const typingId = appendTypingIndicator();

        try {
            const isTranslateOn = localStorage.getItem('koda_translate_th') === 'true';
            
            const savedData = JSON.parse(localStorage.getItem('koda_portfolio_data') || '{}');
            const wl = (savedData.watchlist || []).map(w => w.symbol).join(', ');
            const port = (savedData.holdings || []).map(h => `${h.symbol} (${h.shares} sh)`).join(', ');

            // 📌 กลับมาใช้ camelCase ตามมาตรฐาน Google REST API (fetch)
            const payload = {
                contents: currentHistory,
                systemInstruction: {
                    parts: [{ 
                        text: `You are KODA, a highly intelligent and professional AI financial assistant. 
                        Provide concise, accurate, and insightful market analysis. 
                        You have access to Google Search to find the latest, real-time data, news, and stock prices. ALWAYS use the latest data if asked about current prices, news, or recent events.
                        User's Context: They are currently tracking these stocks in their Watchlist: [${wl || 'None'}]. 
                        They hold these assets in their Portfolio: [${port || 'Empty'}]. 
                        ${isTranslateOn ? "IMPORTANT: You MUST reply entirely in Thai language, translating financial terms clearly while keeping stock tickers (e.g. AAPL, TSLA) in English." : "Please reply in English."}` 
                    }]
                },
                // 📌 ใช้ googleSearch
                tools: [{ googleSearch: {} }], 
                generationConfig: {
                    temperature: 0.7,
                    maxOutputTokens: 1500,
                }
            };

            let retries = 3;
            let aiResponseText = null;

            if (!GEMINI_API_KEYS || GEMINI_API_KEYS.length === 0) {
                throw new Error("No API Keys found. Please check Vercel Environment Variables.");
            }

            while (retries > 0) {
                try {
                    const activeKey = GEMINI_API_KEYS[currentKeyIdx].trim();
                    
                    // 📌 กลับมาใช้ gemini-1.5-flash เพื่อโควต้าที่เยอะและรองรับ Search
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${activeKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.status === 429) {
                        currentKeyIdx = (currentKeyIdx + 1) % GEMINI_API_KEYS.length;
                        retries--;
                        await new Promise(r => setTimeout(r, 2000));
                        continue;
                    }

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                        aiResponseText = data.candidates[0].content.parts[0].text;
                        break;
                    } else if (data.error) {
                        throw new Error(data.error.message);
                    } else {
                        throw new Error("Invalid format from API");
                    }
                } catch(err) {
                    retries--;
                    if(retries === 0) throw err;
                    await new Promise(r => setTimeout(r, 1500));
                }
            }

            const typingElement = document.getElementById(typingId);
            if (typingElement) typingElement.remove();

            if (aiResponseText) {
                appendAIMessage(aiResponseText);
                currentHistory.push({ role: "model", parts: [{ text: aiResponseText }] });
                saveSession();
            } else {
                appendAIMessage("⚠️ ขออภัยครับ โควต้าเต็มหรือระบบขัดข้อง");
                currentHistory.pop(); 
                saveSession();
            }

        } catch (error) {
            console.error("Gemini API Error:", error);
            const typingElement = document.getElementById(typingId);
            if (typingElement) typingElement.remove();
            
            // 📌 แสดง Error จริงๆ ออกมาให้เห็นบนหน้าจอ จะได้แก้ถูกจุด!
            appendAIMessage(`🚨 ระบบขัดข้อง: ${error.message}`);
            currentHistory.pop(); 
            saveSession();
        }
    });

});
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(() => {
      console.log('Service Worker Registered');
    });
  }
</script>
</body>
</html>
