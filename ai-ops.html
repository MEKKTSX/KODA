<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KODA - AI Operations</title>
    <script src="js/keys.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e17">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#34a8eb", 
                        "success": "#00c076", 
                        "danger": "#ff4d4d", 
                        "background-dark": "#0a0e17", 
                        "surface-dark": "#161c2b", 
                        "border-dark": "#232b3e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        ::-webkit-scrollbar { display: none; }
        body { min-height: max(884px, 100dvh); }
        
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        .ai-message-content b, .ai-message-content strong { color: #fff; font-weight: 700; }
        .ai-message-content p { margin-bottom: 0.5rem; }
        .ai-message-content ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.5rem; }
        .ai-message-content li { margin-bottom: 0.25rem; }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen font-display flex flex-col relative">
<div class="max-w-md mx-auto flex flex-col min-h-screen w-full border-x border-border-dark/30 relative overflow-x-hidden">
    
    <header class="flex items-center p-4 pb-3 justify-between sticky top-0 bg-background-dark/95 backdrop-blur-md z-20 border-b border-border-dark/30 shrink-0">
        <div class="flex size-10 items-center justify-center rounded-full bg-primary/20 border border-primary/30">
            <span class="material-symbols-outlined text-primary text-xl">auto_awesome</span>
        </div>
        <div class="flex flex-col items-center flex-1">
            <h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight">KODA Copilot</h2>
            <p class="text-success text-[10px] uppercase font-bold tracking-wider flex items-center gap-1" id="header-status">
                <span class="size-1.5 bg-success rounded-full animate-pulse"></span> Online
            </p>
        </div>
        <button id="btn-new-chat" class="flex size-10 items-center justify-center rounded-full hover:bg-surface-dark text-slate-300 transition-colors">
            <span class="material-symbols-outlined">add_comment</span>
        </button>
    </header>

    <main class="flex-1 overflow-y-auto pb-48 px-4 pt-4 flex flex-col gap-5" id="chat-container">
        
        <div class="bg-gradient-to-br from-surface-dark to-background-dark border border-border-dark rounded-2xl p-4 shadow-lg shrink-0">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-white text-sm font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-base">summarize</span> Morning Briefing
                </h3>
                <span class="text-slate-500 text-[10px]">Daily Update</span>
            </div>
            <div id="morning-brief-content">
                <div class="flex justify-center py-2"><div class="size-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>
            </div>
        </div>

        <div class="shrink-0" id="recent-chats-wrapper" style="display: none;">
            <div class="flex items-center justify-between mb-2">
                <h4 class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Recent Chats</h4>
                <button id="btn-clear-chats" class="text-slate-500 hover:text-danger transition-colors text-[10px] font-bold uppercase tracking-widest">Clear</button>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4 snap-x no-scrollbar" id="recent-chats-container">
            </div>
        </div>

        <div class="flex flex-col gap-4" id="chat-messages">
        </div>

        <div id="scroll-anchor" class="h-1 shrink-0"></div>

    </main>

    <div class="fixed bottom-[68px] left-1/2 -translate-x-1/2 w-full max-w-md bg-background-dark/95 backdrop-blur-lg border-t border-border-dark z-20 px-4 py-3">
        
        <!-- 📌 [เพิ่มใหม่] คอนเทนเนอร์แสดงรูปที่แนบก่อนกดส่ง -->
        <div id="image-preview-container" class="hidden pb-2 w-full pl-2">
            <div class="relative inline-block">
                <img id="image-preview-img" src="" class="h-16 w-auto rounded-xl border border-border-dark object-cover shadow-md opacity-90">
                <button id="btn-remove-image" class="absolute -top-2 -right-2 bg-danger text-white rounded-full size-5 flex items-center justify-center shadow-[0_0_10px_rgba(0,0,0,0.5)] hover:scale-110 transition-transform">
                    <span class="material-symbols-outlined text-[12px]">close</span>
                </button>
            </div>
        </div>

        <div class="relative flex items-end bg-surface-dark border border-border-dark rounded-2xl focus-within:border-primary/50 focus-within:ring-1 focus-within:ring-primary/50 transition-all p-2 gap-2 shadow-inner">
            
            <!-- 📌 [เพิ่มใหม่] ไอคอนแนบรูปภาพ -->
            <label for="ai-image-upload" class="cursor-pointer text-slate-400 hover:text-primary transition-colors p-2 rounded-xl hover:bg-slate-800 flex items-center justify-center shrink-0 mb-0.5 outline-none">
                <span class="material-symbols-outlined text-[20px]">add_photo_alternate</span>
                <input type="file" id="ai-image-upload" accept="image/png, image/jpeg, image/webp" class="hidden">
            </label>

            <!-- ปุ่มเลือก Model (ของเดิม) -->
            <button type="button" id="btn-model-picker" class="flex items-center gap-1 px-3 py-2 rounded-xl bg-background-dark border border-border-dark text-slate-300 hover:text-white transition-colors text-xs font-bold shrink-0 mb-0.5 outline-none">
                <span id="active-model-icon" class="material-symbols-outlined text-[16px] text-slate-500">expand_less</span>
                <span id="active-model-label">Pro</span>
            </button>

            <!-- กล่องพิมพ์ (ของเดิม) -->
            <textarea id="chat-input" rows="1" class="flex-1 min-w-0 bg-transparent border-none text-sm text-slate-100 placeholder:text-slate-500 focus:ring-0 p-0 py-2 outline-none resize-none max-h-32 overflow-y-auto no-scrollbar" placeholder="Ask KODA or attach chart..."></textarea>
            
            <!-- ปุ่มส่ง (ของเดิม) -->
            <button type="button" id="send-btn" class="flex size-9 shrink-0 items-center justify-center rounded-xl bg-primary text-white hover:bg-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed mb-0.5 outline-none" disabled>
                <span class="material-symbols-outlined text-lg ml-0.5">send</span>
            </button>
            
            <!-- Popup Model (ของเดิม) -->
            <div id="model-popup" class="absolute bottom-full left-0 mb-2 w-[300px] bg-surface-dark border border-border-dark rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] z-50 p-2 hidden transition-all opacity-0 scale-95 origin-bottom-left">
                <!-- เนื้อหา Model ตัวเลือกของเดิมของคุณ ... -->
                <h4 class="text-slate-500 text-[10px] font-bold uppercase tracking-widest px-3 pt-2 pb-2">Select Model & Usage</h4>
                
                <button type="button" class="model-opt flex w-full items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-colors text-left relative group" data-model="flash">
                    <div class="flex size-8 shrink-0 items-center justify-center rounded-full bg-primary/20 text-primary group-hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[16px]">bolt</span></div>
                    <div class="flex-1 pr-6">
                        <div class="flex justify-between items-center"><p class="text-white text-sm font-bold">Pro (SOTA)</p><p id="limit-flash" class="text-success text-[10px] font-bold tracking-wider">--/-- RPD</p></div>
                        <p class="text-slate-400 text-[10px] mt-0.5">Gemini 2.5 Flash + Native Search</p>
                    </div>
                    <span class="check-icon material-symbols-outlined text-primary text-lg absolute right-3 hidden">check_circle</span>
                </button>
                
                <div class="border-t border-border-dark/50 my-1"></div>
                
                <button type="button" class="model-opt flex w-full items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-colors text-left relative group" data-model="lite">
                    <div class="flex size-8 shrink-0 items-center justify-center rounded-full bg-slate-700 text-slate-300 group-hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[16px]">flash_on</span></div>
                    <div class="flex-1 pr-6">
                        <div class="flex justify-between items-center"><p class="text-white text-sm font-bold">Flash Lite</p><p id="limit-lite" class="text-primary text-[10px] font-bold tracking-wider">--/-- RPD</p></div>
                        <p class="text-slate-400 text-[10px] mt-0.5">Fast & Concise (No Live Search)</p>
                    </div>
                    <span class="check-icon material-symbols-outlined text-primary text-lg absolute right-3 hidden">check_circle</span>
                </button>
                
                <div class="border-t border-border-dark/50 my-1"></div>

                <button type="button" class="model-opt flex w-full items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-colors text-left relative group" data-model="serper">
                    <div class="flex size-8 shrink-0 items-center justify-center rounded-full bg-yellow-500/20 text-yellow-400 group-hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[16px]">travel_explore</span></div>
                    <div class="flex-1 pr-6">
                        <div class="flex justify-between items-center"><p class="text-white text-sm font-bold">Serper</p><p id="limit-serper" class="text-yellow-500 text-[10px] font-bold tracking-wider">--/-- CRD</p></div>
                        <p class="text-slate-400 text-[10px] mt-0.5">Flash Lite + Serper.dev Live Info</p>
                    </div>
                    <span class="check-icon material-symbols-outlined text-primary text-lg absolute right-3 hidden">check_circle</span>
                </button>
            </div>
        </div>
    </div>

    <div id="bottom-nav-container"></div>
    
    <div id="modal-clear-chat" class="fixed inset-0 bg-background-dark/90 backdrop-blur-sm z-[100] hidden flex-col justify-center items-center transition-opacity opacity-0 px-4">
        <div class="bg-surface-dark border border-border-dark rounded-3xl p-6 w-full max-sm shadow-[0_10px_40px_rgba(0,0,0,0.5)] transform scale-95 transition-transform" id="modal-clear-content">
            <div class="flex justify-center mb-4">
                <div class="size-12 rounded-full bg-danger/20 text-danger flex items-center justify-center">
                    <span class="material-symbols-outlined text-2xl">delete_sweep</span>
                </div>
            </div>
            <h3 class="text-white text-lg font-bold text-center mb-2">Clear Chat History</h3>
            <p class="text-slate-400 text-sm text-center mb-6">คุณต้องการลบเฉพาะแชทหน้านี้ หรือล้างประวัติทั้งหมด?</p>
            <div class="flex flex-col gap-3">
                <button id="btn-clear-current" class="w-full bg-surface-dark border border-border-dark text-white font-bold rounded-xl py-3 hover:bg-slate-800 transition-colors">Clear This Chat Only</button>
                <button id="btn-clear-all" class="w-full bg-danger/10 border border-danger/30 text-danger font-bold rounded-xl py-3 hover:bg-danger hover:text-white transition-colors">Clear All Chats</button>
                <button id="btn-cancel-clear" class="w-full bg-transparent text-slate-500 font-bold rounded-xl py-2 mt-1 hover:text-white transition-colors">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="js/nav.js"></script>
<script src="js/ai-helper.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {

    await window.loadKodaConfig();
    
    const GEMINI_API_KEYS = window.ENV_KEYS.GEMINI;
    const SERPER_KEYS = window.ENV_KEYS.SERPER || []; 
    
    let currentKeyIdx = 0;
    let currentSerperIdx = 0;
    let activeModel = localStorage.getItem('koda_active_model') || 'flash';

    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const chatMessages = document.getElementById('chat-messages');
    const chatContainer = document.getElementById('chat-container');
    const btnNewChat = document.getElementById('btn-new-chat');
    const recentChatsWrapper = document.getElementById('recent-chats-wrapper');
    const recentChatsContainer = document.getElementById('recent-chats-container');
    const morningBriefContent = document.getElementById('morning-brief-content');

    const btnModelPicker = document.getElementById('btn-model-picker');
    const modelPopup = document.getElementById('model-popup');
    const activeModelLabel = document.getElementById('active-model-label');

    let kodaSessions = JSON.parse(localStorage.getItem('koda_chat_sessions') || '{}');
    let currentSessionId = null;
    let currentHistory = []; 
    
    let attachedImageBase64 = null;
    let attachedImageMimeType = null;
    let attachedImageThumbUrl = null;

    const imgInput = document.getElementById('ai-image-upload');
    const previewContainer = document.getElementById('image-preview-container');
    const previewImg = document.getElementById('image-preview-img');
    const btnRemoveImg = document.getElementById('btn-remove-image');

    // ระบบติดตามโควต้า
    const getUsage = () => {
        const today = new Date().toISOString().split('T')[0];
        let usage = JSON.parse(localStorage.getItem('koda_api_usage')) || {};
        if (usage.date !== today) usage = { date: today, flash: 0, lite: 0, serper: 0 };
        return usage;
    };
    const incrementUsage = (model) => {
        const usage = getUsage();
        usage[model] += 1;
        localStorage.setItem('koda_api_usage', JSON.stringify(usage));
        updateModelUI();
    };

    // 📌 อัปเดต UI ปุ่ม Model และ Limit ภายใน Popup (📌 และ Header Status)
    const updateModelUI = () => {
        const usage = getUsage();
        const headerStatus = document.getElementById('header-status'); // <--- 📌 กลับมาโชว์ Online/Limit Reached
        
        const MAX_FLASH = (GEMINI_API_KEYS?.length || 1) * 20; 
        const MAX_LITE = 14400; 
        const MAX_SERPER = (SERPER_KEYS?.length || 0) * 2500; 

        const remainFlash = Math.max(0, MAX_FLASH - usage.flash);
        const remainLite = Math.max(0, MAX_LITE - usage.lite);
        const remainSerper = Math.max(0, MAX_SERPER - usage.serper);

        document.getElementById('limit-flash').textContent = `${remainFlash}/${MAX_FLASH} RPD`;
        document.getElementById('limit-flash').className = `text-[10px] font-bold tracking-wider ${remainFlash > 0 ? 'text-success' : 'text-danger'}`;
        
        document.getElementById('limit-lite').textContent = `${remainLite.toLocaleString()}/${MAX_LITE.toLocaleString()} RPD`;
        document.getElementById('limit-lite').className = `text-[10px] font-bold tracking-wider ${remainLite > 0 ? 'text-primary' : 'text-danger'}`;
        
        document.getElementById('limit-serper').textContent = `${remainSerper.toLocaleString()}/${MAX_SERPER.toLocaleString()} CRD`;
        document.getElementById('limit-serper').className = `text-[10px] font-bold tracking-wider ${remainSerper > 0 ? 'text-yellow-500' : 'text-danger'}`;

        document.querySelectorAll('.model-opt').forEach(opt => {
            const check = opt.querySelector('.check-icon');
            if (opt.dataset.model === activeModel) {
                opt.classList.add('bg-primary/10', 'border', 'border-primary/30');
                check.classList.remove('hidden');
            } else {
                opt.classList.remove('bg-primary/10', 'border', 'border-primary/30');
                check.classList.add('hidden');
            }
        });

        // อัปเดตป้ายชื่อบนปุ่มแคปซูล
        if (activeModel === 'flash') activeModelLabel.textContent = "Pro";
        else if (activeModel === 'lite') activeModelLabel.textContent = "Lite";
        else if (activeModel === 'serper') activeModelLabel.textContent = "Serper";

        // 📌 อัปเดต Header Status (ให้สอดคล้องกับ Model ที่เลือก)
        if (activeModel === 'flash') {
            headerStatus.innerHTML = `<span class="size-1.5 ${remainFlash > 0 ? 'bg-success animate-pulse' : 'bg-danger'} rounded-full"></span> ${remainFlash > 0 ? 'Online' : 'Limit Reached'}`;
            headerStatus.className = `text-[10px] uppercase font-bold tracking-wider flex items-center gap-1 ${remainFlash > 0 ? 'text-success' : 'text-danger'}`;
        } else if (activeModel === 'lite') {
            headerStatus.innerHTML = `<span class="size-1.5 ${remainLite > 0 ? 'bg-primary animate-pulse' : 'bg-danger'} rounded-full"></span> ${remainLite > 0 ? 'Online' : 'Limit Reached'}`;
            headerStatus.className = `text-[10px] uppercase font-bold tracking-wider flex items-center gap-1 ${remainLite > 0 ? 'text-primary' : 'text-danger'}`;
        } else if (activeModel === 'serper') {
            headerStatus.innerHTML = `<span class="size-1.5 ${remainSerper > 0 ? 'bg-yellow-500 animate-pulse' : 'bg-danger'} rounded-full"></span> ${remainSerper > 0 ? 'Online' : 'Limit Reached'}`;
            headerStatus.className = `text-[10px] uppercase font-bold tracking-wider flex items-center gap-1 ${remainSerper > 0 ? 'text-yellow-500' : 'text-danger'}`;
        }

        localStorage.setItem('koda_active_model', activeModel);
    };

    // ควบคุมการเปิด/ปิด Model Popup
    const toggleModelPopup = () => {
        modelPopup.classList.toggle('hidden');
        const icon = btnModelPicker.querySelector('.material-symbols-outlined');
        if (!modelPopup.classList.contains('hidden')) {
            setTimeout(() => { modelPopup.classList.remove('opacity-0', 'scale-95'); }, 10);
            icon.textContent = 'expand_more'; // หมุนลูกศรลง
        } else {
            modelPopup.classList.add('opacity-0', 'scale-95');
            icon.textContent = 'expand_less'; // หมุนลูกศรขึ้น
        }
    };

    btnModelPicker.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleModelPopup();
    });

    document.querySelectorAll('.model-opt').forEach(opt => {
        opt.addEventListener('click', (e) => {
            activeModel = e.currentTarget.dataset.model;
            updateModelUI();
            toggleModelPopup();
        });
    });

    document.addEventListener('click', (e) => {
        if (modelPopup && !modelPopup.classList.contains('hidden') && !btnModelPicker.contains(e.target) && !modelPopup.contains(e.target)) {
            toggleModelPopup();
        }
    });
    
    updateModelUI();

    // 📌 Textarea Auto-expand (พิมพ์ขยายกล่องอัตโนมัติ)
    chatInput.addEventListener('input', function() {
        this.style.height = 'auto'; // Reset ความสูง
        this.style.height = (this.scrollHeight) + 'px'; // ปรับตาม content
        if(this.value.trim() === '') this.style.height = 'auto'; // ถ้าลบหมด กลับเป็น 1 บรรทัด
        sendBtn.disabled = this.value.trim() === '';
    });

    const fetchSerperData = async (query) => {
        if (!SERPER_KEYS || SERPER_KEYS.length === 0) return "No Serper API Keys available.";
        let attempts = SERPER_KEYS.length;
        while(attempts > 0) {
            const key = SERPER_KEYS[currentSerperIdx];
            try {
                const res = await fetch('https://google.serper.dev/search', {
                    method: 'POST', headers: { 'X-API-KEY': key, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: query, gl: 'th', hl: 'th' })
                });
                if (res.status === 403 || res.status === 429) { currentSerperIdx = (currentSerperIdx + 1) % SERPER_KEYS.length; attempts--; continue; }
                const data = await res.json();
                incrementUsage('serper');
                let snippet = "Google Search Results:\n";
                if(data.answerBox && data.answerBox.snippet) snippet += `- [Highlight]: ${data.answerBox.snippet}\n`;
                if(data.organic) { data.organic.slice(0, 4).forEach(r => snippet += `- [News]: ${r.title} - ${r.snippet}\n`); }
                return snippet;
            } catch(e) { attempts--; }
        }
        return "Failed to fetch Live Data.";
    };

    const renderMorningBrief = async () => {
        const baseBrief = "The US market closed mixed last night. Tech stocks rallied due to strong AI chip demand, while the energy sector pulled back slightly on oil inventory reports. Overall sentiment remains cautiously optimistic. Watch for upcoming CPI data.";
        const isTranslateOn = localStorage.getItem('koda_translate_th') === 'true';
        if (isTranslateOn && window.KodaAI && typeof window.KodaAI.translateText === 'function') {
            const translatedText = await window.KodaAI.translateText(baseBrief);
            morningBriefContent.innerHTML = `<p class="text-slate-300 text-sm leading-relaxed">${translatedText}</p>`;
        } else {
            morningBriefContent.innerHTML = `<p class="text-slate-300 text-sm leading-relaxed">${baseBrief}</p>`;
        }
    };
    renderMorningBrief();

    const scrollToBottom = () => {
        requestAnimationFrame(() => {
            setTimeout(() => {
                const anchor = document.getElementById('scroll-anchor');
                if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
                window.scrollTo({ top: document.body.scrollHeight || document.documentElement.scrollHeight, behavior: 'smooth' });
                if (chatContainer) chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            }, 100); 
        });
    };

    chatInput.addEventListener('focus', () => setTimeout(scrollToBottom, 300));
    window.addEventListener('resize', scrollToBottom);

    const appendUserMessage = (text, imgDataUrl = null) => {
        let imgHtml = '';
        if (imgDataUrl) {
            imgHtml = `<img src="${imgDataUrl}" class="max-w-full rounded-xl mb-2 border border-white/10 opacity-90">`;
        }
        
        const html = `
            <div class="flex justify-end w-full mb-4">
                <div class="bg-primary text-white rounded-2xl rounded-br-sm p-3 shadow-sm max-w-[85%]">
                    ${imgHtml}
                    ${text ? `<p class="text-sm leading-relaxed whitespace-pre-wrap">${text}</p>` : ''}
                </div>
            </div>`;
        chatMessages.insertAdjacentHTML('beforeend', html);
        scrollToBottom(); 
    };

    const appendAIMessage = (text) => {
        const html = `
            <div class="flex items-end gap-2 w-full max-w-[90%]">
                <div class="flex size-6 shrink-0 items-center justify-center rounded-full bg-primary/20 border border-primary/30 mb-1">
                    <span class="material-symbols-outlined text-primary text-[14px]">auto_awesome</span>
                </div>
                <div class="bg-surface-dark border border-border-dark rounded-2xl rounded-bl-sm p-3 shadow-sm ai-message-content text-slate-200 text-sm leading-relaxed">
                    ${markedToHtml(text)}
                </div>
            </div>`;
        chatMessages.insertAdjacentHTML('beforeend', html);
        scrollToBottom(); 
    };

    const appendTypingIndicator = () => {
        const id = 'typing-' + Date.now();
        const html = `
            <div id="${id}" class="flex items-end gap-2 w-full max-w-[85%]">
                <div class="flex size-6 shrink-0 items-center justify-center rounded-full bg-primary/20 border border-primary/30 mb-1">
                    <span class="material-symbols-outlined text-primary text-[14px]">auto_awesome</span>
                </div>
                <div class="bg-surface-dark border border-border-dark rounded-2xl rounded-bl-sm py-3 px-4 shadow-sm flex gap-1 items-center h-[42px]">
                    <div class="size-2 bg-slate-500 rounded-full typing-dot"></div>
                    <div class="size-2 bg-slate-500 rounded-full typing-dot"></div>
                    <div class="size-2 bg-slate-500 rounded-full typing-dot"></div>
                </div>
            </div>`;
        chatMessages.insertAdjacentHTML('beforeend', html);
        scrollToBottom(); 
        return id;
    };

    const markedToHtml = (text) => {
        let html = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-white">$1</b>'); 
        html = html.replace(/\*(.*?)\*/g, '<i>$1</i>'); 
        html = html.replace(/(?:\r\n|\r|\n)\* /g, '<br/>• '); 
        html = html.replace(/(?:\r\n|\r|\n)\- /g, '<br/>• '); 
        html = html.replace(/\n\n/g, '</p><p class="mt-2">'); 
        html = html.replace(/\n/g, '<br/>'); 
        return `<p>${html}</p>`;
    };

    const saveSession = () => {
        if (!currentSessionId || currentHistory.length === 0) return;
        kodaSessions[currentSessionId] = { id: currentSessionId, timestamp: Date.now(), title: currentHistory.find(m => m.role === 'user')?.parts[0].text.substring(0, 25) + '...' || 'New Chat', history: currentHistory };
        localStorage.setItem('koda_chat_sessions', JSON.stringify(kodaSessions));
        renderRecentChats();
    };

    const loadSession = (sessionId) => {
        if (!kodaSessions[sessionId]) return;
        currentSessionId = sessionId;
        currentHistory = kodaSessions[sessionId].history;
        chatMessages.innerHTML = ''; 
        currentHistory.forEach(msg => { if (msg.role === 'user') appendUserMessage(msg.parts[0].text); else appendAIMessage(msg.parts[0].text); });
        scrollToBottom();
    };

    const createNewSession = () => {
        currentSessionId = 'session_' + Date.now();
        currentHistory = [];
        chatMessages.innerHTML = '';
        const isTranslateOn = localStorage.getItem('koda_translate_th') === 'true';
        const welcomeText = isTranslateOn ? "สวัสดีครับ! ผม KODA พร้อมวิเคราะห์ตลาดให้คุณแล้ว วันนี้อยากให้ผมช่วยดูหุ้นตัวไหน หรือเช็คพอร์ตของคุณไหมครับ?" : "Hello! I'm KODA, ready to analyze the markets. What would you like to check today?";
        appendAIMessage(welcomeText);
    };

    const renderRecentChats = () => {
        const sessionsArray = Object.values(kodaSessions).sort((a, b) => b.timestamp - a.timestamp);
        if (sessionsArray.length === 0) { recentChatsWrapper.style.display = 'none'; return; }
        recentChatsWrapper.style.display = 'block';
        recentChatsContainer.innerHTML = sessionsArray.map(session => `<button class="shrink-0 bg-surface-dark border ${session.id === currentSessionId ? 'border-primary text-primary' : 'border-border-dark text-slate-300'} text-[10px] font-medium px-4 py-2 rounded-full hover:border-primary hover:text-primary transition-colors snap-start flex items-center gap-1" onclick="window.switchKodaChat('${session.id}')"><span class="material-symbols-outlined text-[12px]">chat_bubble</span> ${session.title}</button>`).join('');
    };

    window.switchKodaChat = (sessionId) => { loadSession(sessionId); renderRecentChats(); };

    btnNewChat.addEventListener('click', () => { createNewSession(); renderRecentChats(); });

    // ระบบ Modal Clear History
    const modalClear = document.getElementById('modal-clear-chat');
    const contentClear = document.getElementById('modal-clear-content');

    document.getElementById('btn-clear-chats').addEventListener('click', () => {
        modalClear.classList.remove('hidden'); modalClear.classList.add('flex');
        setTimeout(() => { modalClear.classList.remove('opacity-0'); contentClear.classList.remove('scale-95'); }, 10);
    });

    document.getElementById('btn-cancel-clear').addEventListener('click', () => {
        modalClear.classList.add('opacity-0'); contentClear.classList.add('scale-95');
        setTimeout(() => { modalClear.classList.add('hidden'); modalClear.classList.remove('flex'); }, 300);
    });

    document.getElementById('btn-clear-current').addEventListener('click', () => {
        if(currentSessionId && kodaSessions[currentSessionId]) {
            delete kodaSessions[currentSessionId]; localStorage.setItem('koda_chat_sessions', JSON.stringify(kodaSessions));
            const keys = Object.keys(kodaSessions);
            if(keys.length > 0) loadSession(kodaSessions[keys[keys.length-1]].id);
            else createNewSession();
            renderRecentChats();
        }
        document.getElementById('btn-cancel-clear').click();
    });

    document.getElementById('btn-clear-all').addEventListener('click', () => {
        kodaSessions = {}; localStorage.removeItem('koda_chat_sessions'); createNewSession(); renderRecentChats();
        document.getElementById('btn-cancel-clear').click();
    });

    if (Object.keys(kodaSessions).length > 0) {
        const latestSession = Object.values(kodaSessions).sort((a, b) => b.timestamp - a.timestamp)[0];
        loadSession(latestSession.id);
        renderRecentChats();
    } else {
        createNewSession();
    }
    
    // 📌 ระบบจัดการการแนบรูปภาพ
    if (imgInput) {
        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            attachedImageMimeType = file.type;
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64String = event.target.result;
                previewImg.src = base64String;
                attachedImageThumbUrl = base64String; // เก็บไว้โชว์ในแชท
                previewContainer.classList.remove('hidden');
                attachedImageBase64 = base64String.split(',')[1];
                
                // ปลดล็อกปุ่มส่งเผื่อส่งแค่รูปไม่มีข้อความ
                sendBtn.disabled = false; 
            };
            reader.readAsDataURL(file);
        });
    }

    if (btnRemoveImg) {
        btnRemoveImg.addEventListener('click', () => {
            attachedImageBase64 = null;
            attachedImageMimeType = null;
            attachedImageThumbUrl = null;
            imgInput.value = ''; 
            previewContainer.classList.add('hidden');
            previewImg.src = '';
            
            // ล็อกปุ่มส่งกลับถ้าช่องแชทว่างเปล่า
            if (chatInput.value.trim() === '') {
                sendBtn.disabled = true;
            }
        });
    }

    // 📌 แก้ไข Textarea Auto-expand ให้ปลดปุ่ม Send ถ้ารูปถูกแนบอยู่
    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if(this.value.trim() === '') this.style.height = 'auto';
        // ปลดล็อกปุ่มถ้ามีข้อความ "หรือ" มีการแนบรูป
        sendBtn.disabled = (this.value.trim() === '' && !attachedImageBase64);
    });

    // 📌 [อัปเดตใหม่] ส่งข้อความ + รูปภาพ (แก้บัค LocalStorage เต็ม)
    const processMessage = async () => {
        let text = chatInput.value.trim();
        const hasImage = !!attachedImageBase64;
        
        if (!text && !hasImage) return;

        // ถ้าส่งมาแค่รูป ไม่มีข้อความ ให้สั่ง AI วิเคราะห์รูป
        if (!text && hasImage) {
            text = "โปรดวิเคราะห์รูปภาพนี้อย่างละเอียด คัดแยกข้อมูลสำคัญออกมาให้หน่อย";
        }

        // 1. แสดงผลขึ้นจอแชท
        appendUserMessage(text, attachedImageThumbUrl);
        
        // 2. Backup ค่ารูปภาพชั่วคราวเพื่อส่ง API
        const tmpBase64 = attachedImageBase64;
        const tmpMime = attachedImageMimeType;

        // 3. เคลียร์ UI ให้สะอาด
        chatInput.value = '';
        chatInput.style.height = 'auto';
        sendBtn.disabled = true;
        attachedImageBase64 = null;
        attachedImageMimeType = null;
        attachedImageThumbUrl = null;
        imgInput.value = '';
        previewContainer.classList.add('hidden');
        previewImg.src = '';

        if (currentHistory.length > 0 && currentHistory[currentHistory.length - 1].role === 'user') { 
            currentHistory.pop(); 
        }

        // 🚨 4. [จุดแก้บัค] เก็บเฉพาะ "ข้อความ" ลง LocalStorage เท่านั้น! (ป้องกันหน่วยความจำเบราว์เซอร์ระเบิด)
        currentHistory.push({ role: "user", parts: [{ text: text }] });
        saveSession(); 

        const typingId = appendTypingIndicator();

        try {
            const isTranslateOn = localStorage.getItem('koda_translate_th') === 'true';
            const savedData = JSON.parse(localStorage.getItem('koda_portfolio_data') || '{}');
            const wl = (savedData.watchlist || []).map(w => w.symbol).join(', ');
            const port = (savedData.holdings || []).map(h => `${h.symbol} (${h.shares} sh)`).join(', ');

            // 🚨 5. [จุดแก้บัค] โคลนประวัติแชทออกมา เพื่อเอามายัดรูปใส่เฉพาะตอนส่ง API
            let modifiedHistory = JSON.parse(JSON.stringify(currentHistory));
            
            // ถ้ารูปถูกแนบมา ให้ยัดใส่ Payload ของข้อความล่าสุด
            if (hasImage) {
                modifiedHistory[modifiedHistory.length - 1].parts.unshift({
                    inlineData: {
                        mimeType: tmpMime,
                        data: tmpBase64
                    }
                });
            }
            
            if (activeModel === 'serper') {
                const searchResults = await fetchSerperData(text);
                modifiedHistory[modifiedHistory.length - 1].parts.push({ text: `\n\n[Live Search Data:\n${searchResults}]` });
            }

            let payload = {
                contents: modifiedHistory,
                systemInstruction: { parts: [{ text: `You are KODA, a professional AI financial assistant. Analyze charts or images if provided. Context: Watchlist: [${wl || 'None'}], Portfolio: [${port || 'Empty'}]. ${isTranslateOn ? "Reply entirely in Thai, keeping stock tickers in English." : "Reply in English."}` }] },
                generationConfig: { temperature: 0.3, maxOutputTokens: 8192 }
            };

            let targetModelUrl = '';
            
            if (activeModel === 'flash') {
                payload.tools = [{ googleSearch: {} }];
                targetModelUrl = 'gemini-2.5-flash';
            } else {
                targetModelUrl = 'gemini-2.5-flash-lite';
            }

            let retries = 3;
            let aiResponseText = null;

            while (retries > 0) {
                try {
                    const activeKey = GEMINI_API_KEYS[currentKeyIdx];
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModelUrl}:generateContent?key=${activeKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });

                    if (response.status === 429) { 
                        currentKeyIdx = (currentKeyIdx + 1) % GEMINI_API_KEYS.length; 
                        retries--; 
                        await new Promise(r => setTimeout(r, 2000)); 
                        continue; 
                    }

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                        aiResponseText = data.candidates[0].content.parts[0].text;
                        incrementUsage(activeModel === 'serper' ? 'lite' : activeModel);
                        break;
                    } else if (data.error) { 
                        throw new Error(data.error.message); 
                    } else { 
                        throw new Error("Invalid format"); 
                    }
                } catch(err) { 
                    retries--; 
                    if(retries === 0) throw err; 
                    await new Promise(r => setTimeout(r, 1500)); 
                }
            }

            const typingElement = document.getElementById(typingId);
            if (typingElement) typingElement.remove();

            if (aiResponseText) {
                appendAIMessage(aiResponseText);
                currentHistory.push({ role: "model", parts: [{ text: aiResponseText }] });
                saveSession();
            } else {
                appendAIMessage("ขออภัยครับ โควต้าเต็มหรือระบบขัดข้อง กรุณาลองใหม่หรือเปลี่ยน Model ครับ");
                currentHistory.pop(); saveSession();
            }

        } catch (error) {
            console.error("API Error:", error);
            const typingElement = document.getElementById(typingId);
            if (typingElement) typingElement.remove();
            appendAIMessage("ขาดการเชื่อมต่อ หรือรูปภาพมีขนาดใหญ่เกินไป กรุณาลองใหม่อีกครั้งครับ");
            currentHistory.pop(); saveSession();
        }
    };
    // ส่งข้อความเมื่อกดปุ่ม Send เท่านั้น
    sendBtn.addEventListener('click', processMessage);
});
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(() => {
      console.log('Service Worker Registered');
    });
  }
</script>
</body>
