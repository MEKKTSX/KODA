<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KODA - AI Portfolio Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e17">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#34a8eb", 
                        "success": "#00c076", 
                        "danger": "#ff4d4d", 
                        "background-light": "#f5f8f7",
                        "background-dark": "#0a0e17", 
                        "surface-dark": "#161c2b", 
                        "border-dark": "#232b3e",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: max(884px, 100dvh); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="max-w-md mx-auto flex flex-col min-h-screen border-x border-border-dark/30 pb-24 relative overflow-hidden">
    
    <header class="flex items-center p-4 justify-between sticky top-0 bg-background-dark/80 backdrop-blur-md z-10">
        <div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary/20">
            <span class="material-symbols-outlined text-primary">account_circle</span>
        </div>
        <h1 class="text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-3">Portfolio</h1>
        <div class="flex gap-2">
            <button class="p-2 rounded-lg hover:bg-surface-dark transition-colors">
                <span class="material-symbols-outlined text-slate-100">search</span>
            </button>
            <button class="p-2 rounded-lg hover:bg-surface-dark transition-colors relative">
                <span class="material-symbols-outlined text-slate-100">notifications</span>
                <span class="absolute top-2 right-2 flex h-2 w-2 rounded-full bg-success"></span>
            </button>
        </div>
    </header>

    <main class="flex-1 px-4 py-2 flex flex-col gap-6">
        
        <section>
            <div class="grid grid-cols-2 gap-3">
                <a href="portfolio.html" class="col-span-2 flex flex-col gap-1 rounded-xl p-5 bg-surface-dark border border-border-dark hover:bg-slate-800 transition-colors active:scale-[0.98] block">
                    <p class="text-slate-400 text-sm font-medium">Total Value</p>
                    <div class="flex items-end justify-between">
                        <h2 class="text-white text-3xl font-bold leading-tight tracking-tight" id="total-value">$0.00</h2>
                        <span class="text-slate-400 text-sm font-bold bg-slate-800 px-2 py-1 rounded-lg flex items-center gap-1" id="total-percent">
                            <span class="material-symbols-outlined text-sm">horizontal_rule</span>
                            0.00%
                        </span>
                    </div>
                </a>
                
                <div class="flex flex-col gap-1 rounded-xl p-4 bg-surface-dark border border-border-dark">
                    <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Top Gainer</p>
                    <p class="text-white font-bold text-lg mt-1" id="top-gainer-ticker">-</p>
                    <p class="text-slate-400 text-sm font-medium" id="top-gainer-percent">0.00%</p>
                </div>
                <div class="flex flex-col gap-1 rounded-xl p-4 bg-surface-dark border border-border-dark">
                    <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Top Loser</p>
                    <p class="text-white font-bold text-lg mt-1" id="top-loser-ticker">-</p>
                    <p class="text-slate-400 text-sm font-medium" id="top-loser-percent">0.00%</p>
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-white text-lg font-bold tracking-tight">Sector Performance</h3>
                <button id="btn-view-sectors" class="text-primary text-sm font-medium hover:text-white transition-colors">View All</button>
            </div>
            <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar" id="sector-container">
                <p class="text-slate-500 text-sm py-4">Loading sectors...</p>
            </div>
        </section>

        <section class="flex flex-col gap-3">
            <div class="flex items-center justify-between shrink-0">
                <h3 class="text-white text-lg font-bold tracking-tight">AI News Insights</h3>
                <span class="bg-primary/20 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full uppercase flex items-center gap-1">
                    <span class="size-1.5 bg-primary rounded-full animate-pulse"></span>Live
                </span>
            </div>
            <div class="space-y-3 max-h-[420px] overflow-y-auto no-scrollbar pb-4 pr-1" id="news-container">
                <p class="text-slate-500 text-sm text-center py-10">Scanning global markets...</p>
            </div>
        </section>

    </main>

    <div id="modal-sectors" class="fixed inset-0 z-[60] hidden items-end justify-center bg-background-dark/90 backdrop-blur-md transition-opacity">
        <div id="modal-sectors-content" class="w-full max-w-md bg-surface-dark rounded-t-3xl border-t border-border-dark flex flex-col max-h-[80vh] transform translate-y-full transition-transform duration-300 shadow-2xl">
            <div class="p-5 border-b border-border-dark flex justify-between items-center sticky top-0 bg-surface-dark rounded-t-3xl z-10">
                <div class="flex items-center gap-3">
                    <div class="size-8 rounded-lg bg-primary/20 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-xl">pie_chart</span>
                    </div>
                    <h2 class="text-white text-xl font-bold tracking-tight">Market Sectors</h2>
                </div>
                <button id="btn-close-sectors" class="text-slate-400 hover:text-white bg-slate-800 rounded-full p-1.5 active:scale-90 transition-all">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-4 overflow-y-auto space-y-3 no-scrollbar pb-20" id="all-sectors-list">
                <p class="text-slate-500 text-sm text-center py-10">Updating performance...</p>
            </div>
        </div>
    </div>

    <div id="bottom-nav-container"></div>  
    <script src="js/nav.js"></script>
    <script src="js/ai-helper.js"></script>
    <script src="js/api.js"></script>
    <script src="js/stock-detail.js"></script>
    <script src="js/search.js"></script>
</div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(() => {
      console.log('Service Worker Registered');
    });
  }
</script>
</body>
</html>
