<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KODA - Geo-Politics & World News</title>
    <script src="js/keys.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e17">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#34a8eb", "success": "#00c076", "danger": "#ff4d4d", "background-dark": "#0a0e17", "surface-dark": "#161c2b", "border-dark": "#232b3e" }, fontFamily: { "display": ["Inter", "sans-serif"] } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { display: none; }
        body { min-height: max(884px, 100dvh); }
        .timeline-dot::before { content: ''; position: absolute; left: -21px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background-color: #ff4d4d; border: 2px solid #0a0e17; z-index: 10; }
    </style>
</head>
<body class="bg-background-dark text-slate-100 min-h-screen font-display">
<div class="max-w-md mx-auto flex flex-col min-h-screen border-x border-border-dark/30 relative">
    
    <header class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-dark z-20 border-b border-border-dark/30">
        <h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight flex items-center gap-2">
            <span class="material-symbols-outlined text-danger">public</span> Geo-Politics
        </h2>
        <button id="btn-refresh-world" class="flex size-10 items-center justify-center rounded-full hover:bg-surface-dark text-slate-300 transition-colors">
            <span class="material-symbols-outlined">sync</span>
        </button>
    </header>

    <div class="px-4 pt-2 bg-background-dark sticky top-[60px] z-10 border-b border-border-dark/50 shadow-sm">
        <nav class="flex gap-2 p-1 bg-surface-dark rounded-lg mb-2">
            <button id="tab-timeline" class="flex-1 text-xs font-bold py-2 rounded-md bg-danger text-white transition-all">Live Timeline</button>
            <button id="tab-intel" class="flex-1 text-xs font-bold py-2 rounded-md text-slate-400 hover:text-white transition-all flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[14px]">smart_display</span> Video Intel
            </button>
        </nav>
    </div>

    <main class="flex-1 overflow-y-auto pb-28 px-4 pt-6">
        
        <section id="content-timeline" class="space-y-0">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-slate-300 text-xs font-bold uppercase tracking-widest flex items-center gap-1.5">
                    <span class="size-2 bg-danger rounded-full animate-pulse"></span> Breaking Updates
                </h3>
            </div>
            
            <div class="relative border-l-2 border-border-dark ml-2 pl-4 pb-6" id="timeline-container">
                <p class="text-center text-slate-500 text-xs py-10">Scanning global political radars...</p>
            </div>
        </section>

        <section id="content-intel" class="hidden space-y-4">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-slate-300 text-xs font-bold uppercase tracking-widest flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-primary text-[16px]">ondemand_video</span> Strategic Analysis
                </h3>
            </div>
            <div id="video-container" class="space-y-4 pb-6"></div>
        </section>

    </main>

    <div id="modal-world-detail" class="fixed inset-0 z-[100] hidden items-center justify-center bg-background-dark/90 backdrop-blur-sm transition-opacity opacity-0 pb-10">
        <div class="bg-surface-dark border border-border-dark w-[90%] max-w-md rounded-2xl flex flex-col max-h-[85vh] shadow-2xl transform scale-95 transition-transform" id="modal-world-content">
            <div class="flex items-center justify-between p-4 border-b border-border-dark shrink-0">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-danger">military_tech</span>
                    <h3 class="text-white font-bold text-sm uppercase tracking-wider">Strategic Summary</h3>
                </div>
                <button id="btn-close-world-modal" class="text-slate-400 hover:text-white bg-slate-800 rounded-full p-1 active:scale-90 transition-all"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="p-4 overflow-y-auto no-scrollbar flex-1 space-y-4" id="world-modal-body">
                </div>
            <div class="p-4 border-t border-border-dark shrink-0">
                <a id="world-modal-link" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-danger/10 border border-danger/30 text-danger text-center font-bold rounded-xl hover:bg-danger hover:text-white transition-colors text-xs uppercase tracking-wider">
                    <span class="material-symbols-outlined text-[16px]">open_in_new</span> Go to Source
                </a>
            </div>
        </div>
    </div>

    <div id="bottom-nav-container"></div>
</div>

<script src="js/nav.js"></script>
<script>
    window.loadKodaConfig().then(() => {
        const scripts = ["js/ai-helper.js", "js/world-news.js"];
        scripts.forEach(src => {
            const s = document.createElement('script');
            s.src = src;
            document.body.appendChild(s);
        });
    });
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(() => {
      console.log('Service Worker Registered');
    });
  }
</script>    
</body>
</html>
